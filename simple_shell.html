<!doctype html>
<html lang="en-us">

<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>SDL2 Cross-Platform App</title>
    <style>
        #canvas {
            position: absolute;
            top: 0px;
            left: 0px;
            margin: 0px;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: block;
        }
    </style>
</head>

<body>
    <!-- SDL renders into this canvas when the app is built with Emscripten. -->
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>

    <!-- Emscripten reads Module.canvas while initializing SDL's video backend. -->
    <script type='text/javascript'>
        var Module = {
            print: (function () {
                return (...args) => {
                    var text = args.join(' ');
                    console.log(text);
                };
            })(),
            printErr: function (text) {
                if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                if (0) {
                    dump(text + '\n');
                }
            },
            canvas: (() => {
                var canvas = document.getElementById('canvas');

                // A lost WebGL context leaves SDL unable to draw until the page is reloaded.
                canvas.addEventListener("webglcontextlost", (e) => { alert('WebGL context lost. You will need to reload the page.'); e.preventDefault(); }, false);

                return canvas;
            })(),
        };
    </script>
    {{{ SCRIPT }}}
</body>

</html>
